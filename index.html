<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnCash - Watch & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Adsterra Popunder Script -->
    <script src="https://pl28926111.profitablecpmratenetwork.com/12/15/fb/1215fb57c30c4cef7e5d7329a5f9cc53.js"></script>

    <style>
        :root { --primary: #6366f1; --bg: #0f172a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Full Screen Ad Overlay */
        #ad-screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .timer-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 5px solid #333; border-top-color: #6366f1;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-bold; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-spin { animation: none !important; }
    </style>
</head>
<body class="p-4 md:max-w-md mx-auto">

    <!-- Header -->
    <nav class="flex justify-between items-center py-4 mb-6">
        <h1 class="text-2xl font-bold text-indigo-400">EarnCash</h1>
        <div class="glass-card px-4 py-2 flex items-center gap-2">
            <span class="text-yellow-400">🪙</span>
            <span id="balance-display" class="font-bold">0</span>
        </div>
    </nav>

    <!-- DASHBOARD -->
    <div id="dashboard" class="page active">
        <div class="grid grid-cols-2 gap-4">
            <!-- Other tasks... (Math, Spin, etc.) -->
            <div class="glass-card p-5 text-center opacity-50"><div class="text-3xl">🧮</div><p class="text-xs">Math</p></div>
            <div class="glass-card p-5 text-center opacity-50"><div class="text-3xl">🎡</div><p class="text-xs">Spin</p></div>
            
            <!-- ADS TASK (MODIFIED) -->
            <div onclick="startVideoAd()" id="ad-card" class="task-card glass-card p-5 text-center border-indigo-500/50 relative overflow-hidden">
                <div id="ad-cooldown-ui" class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center z-10">
                    <span class="text-[10px] text-gray-400">Next Ad in</span>
                    <span id="ad-timer" class="text-sm font-bold text-indigo-400">60:00</span>
                </div>
                <div class="text-4xl mb-2">📺</div>
                <h3 class="font-bold">Watch Ads</h3>
                <p class="text-[10px] text-green-400" id="ad-count-txt">Limit: 5/5 Left</p>
            </div>
        </div>

        <!-- Wallet Section -->
        <div class="mt-8 glass-card p-5">
            <p class="text-xs text-gray-400">Balance in Cash</p>
            <h2 class="text-3xl font-bold mb-4" id="rs-display">₹0.00</h2>
            <button class="w-full bg-indigo-600 py-3 rounded-xl font-bold">Withdraw Now</button>
        </div>
    </div>

    <!-- FULL SCREEN AD MODAL -->
    <div id="ad-screen">
        <div class="text-center p-6">
            <h2 class="text-xl font-bold mb-2">Watching Ad...</h2>
            <p class="text-gray-400 text-sm mb-10">Do not close this screen to earn points</p>
            
            <div class="relative flex items-center justify-center mb-10">
                <div id="loader" class="timer-circle"></div>
                <div id="countdown-text" class="absolute text-2xl font-bold">30</div>
            </div>

            <p id="ad-msg" class="text-indigo-400 animate-pulse text-sm">Ad Loading & Playing...</p>

            <!-- CLOSE BUTTON (Hidden Initially) -->
            <button id="close-ad-btn" onclick="collectAdReward()" class="hidden mt-6 bg-green-600 px-10 py-4 rounded-2xl font-bold text-lg shadow-xl shadow-green-500/20">
                ✅ COLLECT REWARD
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold hidden z-[200]"></div>

    <script>
        let points = parseInt(localStorage.getItem('user_pts')) || 0;
        let adsWatched = parseInt(localStorage.getItem('ads_watched_count')) || 0;
        let lastReset = localStorage.getItem('ad_reset_time');

        function init() {
            updateUI();
            checkAdLimit();
            setInterval(checkAdLimit, 1000);
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = points;
            document.getElementById('rs-display').innerText = '₹' + (points / 100).toFixed(2);
            document.getElementById('ad-count-txt').innerText = `Limit: ${5 - adsWatched}/5 Left`;
            localStorage.setItem('user_pts', points);
        }

        // --- AD LOGIC ---
        function startVideoAd() {
            if (adsWatched >= 5) {
                showToast("Hourly limit reached!");
                return;
            }

            // Show Full Screen Modal
            document.getElementById('ad-screen').style.display = 'flex';
            
            let timeLeft = 30;
            const countdownTxt = document.getElementById('countdown-text');
            const loader = document.getElementById('loader');
            const closeBtn = document.getElementById('close-ad-btn');
            const adMsg = document.getElementById('ad-msg');

            // Reset UI
            closeBtn.classList.add('hidden');
            loader.classList.remove('no-spin');
            adMsg.innerText = "Ad Playing... (Open in background)";
            countdownTxt.innerText = timeLeft;

            const timer = setInterval(() => {
                timeLeft--;
                countdownTxt.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    loader.classList.add('no-spin');
                    countdownTxt.innerText = "OK";
                    adMsg.innerText = "Reward Ready!";
                    adMsg.classList.remove('animate-pulse');
                    closeBtn.classList.remove('hidden'); // Show the button after 30 sec
                }
            }, 1000);
        }

        function collectAdReward() {
            // Credit points
            points += 20;
            adsWatched++;
            
            localStorage.setItem('ads_watched_count', adsWatched);
            if (adsWatched >= 5) {
                localStorage.setItem('ad_reset_time', Date.now() + 3600000); // 1 hour cooldown
            }

            // UI Reset
            document.getElementById('ad-screen').style.display = 'none';
            updateUI();
            showToast("Success! +20 Points Added");
        }

        function checkAdLimit() {
            const resetTime = localStorage.getItem('ad_reset_time');
            const cooldownUI = document.getElementById('ad-cooldown-ui');
            const adTimerTxt = document.getElementById('ad-timer');

            if (resetTime && Date.now() < resetTime) {
                cooldownUI.classList.remove('hidden');
                let rem = Math.floor((resetTime - Date.now()) / 1000);
                let m = Math.floor(rem / 60);
                let s = rem % 60;
                adTimerTxt.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            } else {
                cooldownUI.classList.add('hidden');
                if (resetTime) {
                    adsWatched = 0;
                    localStorage.setItem('ads_watched_count', 0);
                    localStorage.removeItem('ad_reset_time');
                    updateUI();
                }
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        init();
    </script>
</body>
</html>
